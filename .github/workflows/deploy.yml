name: CI/CD - Build, Push e Deploy na Oracle Cloud e GitHub Pages

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DOCKER_USERNAME: gilsonsouzadev
  BACKEND_IMAGE: gilsonsouzadev/portfolio-backend

jobs:
  test-backend:
    name: Testes Backend (.NET 10)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.x"

      - name: Restaurar dependencias
        run: dotnet restore backend/Portfolio.API.Tests/Portfolio.API.Tests.csproj

      - name: Executar testes
        run: dotnet test backend/Portfolio.API.Tests/Portfolio.API.Tests.csproj --no-restore --verbosity minimal

  build-and-push-backend:
    name: Build e Push Backend Docker
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.event_name == 'push'
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Configurar QEMU (suporte ARM64 para Oracle Ampere A1)
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/arm64

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push - Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vm:
    name: Deploy API na VM Oracle Cloud
    runs-on: ubuntu-latest
    needs: build-and-push-backend
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Copiar arquivos de infra para VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.yml,nginx.conf"
          target: "/opt/portfolio/"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd /opt/portfolio
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f
            echo "Deploy API concluido em $(date)"

  deploy-frontend-ghpages:
    name: Deploy Frontend no GitHub Pages
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      - name: Build Angular
        run: npm run build -- --base-href /portifolio/
        working-directory: ./frontend

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: frontend/dist/frontend/browser
          branch: gh-pages
