# docker-compose.yml — Portfolio App (Produção)
# Uso na VM: docker compose pull && docker compose up -d

services:

  # -------------------------------------------------------
  # Backend: ASP.NET 10 API
  # -------------------------------------------------------
  backend:
    image: gilsonsouzadev/portfolio-backend:latest
    container_name: portfolio-backend
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      # A connection string lê o TNS_ADMIN do volume montado abaixo
      - ConnectionStrings__OracleDb=User Id=ADMIN;Password=${ORACLE_PASSWORD};Data Source=portfoliodb_high;TNS_ADMIN=/app/oracle-wallet
      # Configurações de e-mail (injetadas via .env na VM)
      - Email__ToEmail=${EMAIL_TO}
      - Email__Gmail__FromEmail=${GMAIL_FROM}
      - Email__Gmail__AppPassword=${GMAIL_APP_PASSWORD}
      - Jwt__SecretKey=${JWT_SECRET}
    volumes:
      # Wallet da Oracle montada da VM para dentro do container (SEGURO - nunca vai ao GitHub)
      - /opt/oracle-wallet:/app/oracle-wallet:ro
      - ./wwwroot:/app/wwwroot
    networks:
      - portfolio-net
    expose:
      - "8080"

  # -------------------------------------------------------
  # Frontend: Angular 20 + Nginx
  # -------------------------------------------------------
  frontend:
    image: gilsonsouzadev/portfolio-frontend:latest
    container_name: portfolio-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    volumes:
      # Certificados SSL do Let's Encrypt (gerados pelo Certbot na VM)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    networks:
      - portfolio-net

networks:
  portfolio-net:
    driver: bridge
