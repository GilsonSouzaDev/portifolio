server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip para performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;

    # Cache de assets com hash (gerados pelo Angular com outputHashing: all)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: todas as rotas retornam index.html para o Angular Router funcionar
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy para arquivos estaticos do backend (imagens e documentos)
    location ^~ /images/ {
        proxy_pass http://portfolio-backend:8080/images/;
    }

    location ^~ /assets/docs/ {
        proxy_pass http://portfolio-backend:8080/assets/docs/;
    }

    # Proxy para o backend API (evita CORS em produção)
    location /api/ {
        proxy_pass http://portfolio-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
