<div class="verify-container">
  <div class="verify-card">
    <h1>Digite o código</h1>
    <p>Verifique seu e-mail e digite o código de 6 dígitos recebido.</p>

    @if (error) {
      <div class="error-message">{{ error }}</div>
    }

    <input
      type="text"
      maxlength="6"
      placeholder="000000"
      [(ngModel)]="code"
      (keyup.enter)="verify()"
    />

    <button (click)="verify()" [disabled]="loading">
      @if (loading) {
        Verificando...
      } @else {
        Verificar código
      }
    </button>
  </div>
</div>
